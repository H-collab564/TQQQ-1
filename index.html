<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ Pro Dashboard v2.2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810; --panel:#0b1120; --border:#1a2640;
    --accent:#00e5ff; --green:#00ff88; --red:#ff3e5e;
    --yellow:#ffd600; --text:#e8f0fe; --muted:#5a7090;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace; padding: 20px;
    background-image: radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,100,200,0.12) 0%,transparent 70%);
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; color: var(--accent); }
  
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
  input { 
    background: #111a2e; border: 1px solid var(--border); color: white; 
    padding: 12px; border-radius: 8px; flex: 1; font-family: inherit;
  }
  button { 
    background: var(--accent); color: #000; border: none; padding: 0 25px; 
    border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
  }
  button:hover { opacity: 0.8; transform: translateY(-1px); }
  button:disabled { background: var(--muted); cursor: not-allowed; }

  .step-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
  .step { padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; opacity: 0.5; }
  .step.active { opacity: 1; border-color: var(--accent); color: var(--accent); }
  .step.success { opacity: 1; border-color: var(--green); color: var(--green); }

  .verdict-box { display: none; text-align: center; padding: 40px; border-radius: 16px; margin-top: 20px; }
  .verdict-box.show { display: block; }
  .verdict-box.BUY { background: rgba(0,255,136,0.1); border: 2px solid var(--green); }
  .verdict-box.SELL { background: rgba(255,62,94,0.1); border: 2px solid var(--red); }
  .verdict-box.HOLD { background: rgba(255,214,0,0.1); border: 2px solid var(--yellow); }
  
  .v-label { font-size: 48px; font-weight: 800; font-family: 'Syne', sans-serif; letter-spacing: 2px; }
  .v-sub { font-size: 14px; margin-top: 10px; color: var(--muted); margin-bottom: 20px; }
  
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 10px; }
  .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
  .stat-val { font-size: 18px; font-weight: bold; color: white; display: block; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  .scorecard { margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border); text-align: left; }
  .score-title { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
  .criteria-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .criteria-text { font-size: 14px; font-weight: 600; }
  .criteria-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-icon { font-weight: bold; font-size: 14px; padding: 4px 10px; border-radius: 4px; }
  .pass { background: rgba(0,255,136,0.1); color: var(--green); }
  .fail { background: rgba(255,62,94,0.1); color: var(--red); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">TQQQ ALGO v2.2</div>
    <div id="runtime" style="color:var(--muted); font-size:12px;">System Ready</div>
  </div>

  <div class="panel">
    <div class="input-group">
      <input type="text" id="symbolInput" value="TQQQ" placeholder="Enter Ticker">
      <button id="runBtn" onclick="runAlgorithm()">RUN ANALYSIS</button>
    </div>
    <div class="step-list">
      <div class="step" id="step1">1. INITIALIZING</div>
      <div class="step" id="step2">2. FETCHING TQQQ DATA</div>
      <div class="step" id="step3">3. ANALYZING VOLATILITY</div>
      <div class="step" id="step4">4. CALCULATING VERDICT</div>
    </div>
  </div>

  <div id="verdictBox" class="verdict-box">
    <div class="v-label" id="vLabel">---</div>
    <div class="v-sub" id="vSub">Waiting for data collection...</div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Price</span>
        <span class="stat-val" id="statPrice">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">RSI (14)</span>
        <span class="stat-val" id="statRSI">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Stop Loss (12.5%)</span>
        <span class="stat-val" id="statStop" style="color:var(--red)">--</span>
      </div>
    </div>

    <div class="scorecard">
      <div class="score-title">Technical Scorecard</div>
      <div id="criteriaList"></div>
    </div>
  </div>
</div>

<script>
const API_KEY = "fs4139MjTB8rclaerCjk0CMB59W7QCMS";

async function runAlgorithm() {
    const symbol = document.getElementById('symbolInput').value.toUpperCase();
    const btn = document.getElementById('runBtn');
    
    btn.disabled = true;
    btn.textContent = "RUNNING...";
    
    // UI Reset
    const steps = ['step1', 'step2', 'step3', 'step4'];
    steps.forEach(id => document.getElementById(id).className = 'step');
    document.getElementById('verdictBox').className = 'verdict-box';

    try {
        setStep('step1', 'success');

        // Step 2: Main Ticker Data
        setStep('step2', 'active');
        const priceData = await fetchStockData(symbol);
        const closes = priceData.results.map(r => r.c);
        setStep('step2', 'success');

        // Step 3: VXX Proxy Data (Rate Limit Buffer)
        setStep('step3', 'active');
        await new Promise(r => setTimeout(r, 1200)); 
        const vxxData = await fetchStockData('VXX');
        const vxxResults = vxxData.results;
        const vxxPrice = vxxResults[vxxResults.length - 1].c;
        const vxxPrev = vxxResults[vxxResults.length - 2].c;
        const volSpike = vxxPrice > (vxxPrev * 1.05);
        setStep('step3', 'success');

        // Step 4: Logic Processing
        setStep('step4', 'active');
        const currentPrice = closes[closes.length - 1];
        const rsi = calculateRSI(closes, 14);
        const ema200 = calculateEMA(closes, 200);
        const stopLoss = (currentPrice * 0.875).toFixed(2);

        let verdict = "HOLD";
        let subText = "Market conditions are neutral. Maintain current posture.";

        if (currentPrice > ema200 && rsi < 42 && !volSpike) {
            verdict = "BUY";
            subText = "Entry conditions met: Bullish trend with oversold momentum.";
        } else if (rsi > 78 || currentPrice < ema200 || volSpike) {
            verdict = "SELL";
            subText = volSpike ? "Volatility Spike Detected (VXX)." : "Trend breakdown or extreme overbought.";
        }
        setStep('step4', 'success');

        displayResults(verdict, subText, currentPrice, rsi, vxxPrice, ema200, volSpike, stopLoss);

    } catch (err) {
        console.error(err);
        alert("System Error: " + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = "RUN ANALYSIS";
    }
}

async function fetchStockData(ticker) {
    const to = new Date().toISOString().split('T')[0];
    const from = new Date(Date.now() - 380 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=asc&limit=500&apiKey=${API_KEY}`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error(response.status === 429 ? "Rate Limit: Wait 1m" : `API Error ${response.status}`);
    const data = await response.json();
    if (!data.results) throw new Error("Ticker not found");
    return data;
}

function calculateRSI(prices, period) {
    let gains = 0, losses = 0;
    for (let i = prices.length - period; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        diff >= 0 ? gains += diff : losses -= diff;
    }
    let rs = (gains / period) / (losses / period);
    return (100 - (100 / (1 + rs))).toFixed(2);
}

function calculateEMA(prices, period) {
    const k = 2 / (period + 1);
    let ema = prices[0];
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

function setStep(id, status) {
    document.getElementById(id).className = `step ${status}`;
}

function displayResults(verdict, sub, price, rsi, vxx, ema200, volSpike, stopLoss) {
    const box = document.getElementById('verdictBox');
    box.className = `verdict-box show ${verdict}`;
    document.getElementById('vLabel').textContent = verdict;
    document.getElementById('vSub').textContent = sub;
    document.getElementById('statPrice').textContent = `$${price.toFixed(2)}`;
    document.getElementById('statRSI').textContent = rsi;
    document.getElementById('statStop').textContent = `$${stopLoss}`;

    const criteria = [
        { 
            label: "Uptrend Confirmation", 
            pass: price > ema200, 
            desc: `Price ($${price.toFixed(2)}) is above 200 EMA ($${ema200.toFixed(2)})` 
        },
        { 
            label: "Oversold Entry", 
            pass: rsi < 42, 
            desc: `Current RSI: ${rsi} (Target: < 42)` 
        },
        { 
            label: "Volatility Guard", 
            pass: !volSpike, 
            desc: volSpike ? "VXX 5%+ Spike Detected" : "VXX is stable" 
        }
    ];

    document.getElementById('criteriaList').innerHTML = criteria.map(c => `
        <div class="criteria-row">
            <div>
                <div class="criteria-text">${c.label}</div>
                <div class="criteria-desc">${c.desc}</div>
            </div>
            <div class="status-icon ${c.pass ? 'pass' : 'fail'}">
                ${c.pass ? '✔ PASS' : '✘ FAIL'}
            </div>
        </div>
    `).join('');

    document.getElementById('runtime').textContent = "Last Run: " + new Date().toLocaleTimeString();
}
</script>
</body>
</html>
