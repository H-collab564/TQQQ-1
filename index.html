<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ Pro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810; --panel:#0b1120; --border:#1a2640;
    --accent:#00e5ff; --green:#00ff88; --red:#ff3e5e;
    --yellow:#ffd600; --text:#e8f0fe; --muted:#5a7090;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace; padding: 20px;
    background-image: radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,100,200,0.12) 0%,transparent 70%);
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; color: var(--accent); }
  
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
  input { 
    background: #111a2e; border: 1px solid var(--border); color: white; 
    padding: 12px; border-radius: 8px; flex: 1; font-family: inherit;
  }
  button { 
    background: var(--accent); color: #000; border: none; padding: 0 25px; 
    border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
  }
  button:hover { opacity: 0.8; transform: translateY(-1px); }

  .step-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
  .step { padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; opacity: 0.5; }
  .step.active { opacity: 1; border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
  .step.success { opacity: 1; border-color: var(--green); color: var(--green); }
  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

  .verdict-box { display: none; text-align: center; padding: 40px; border-radius: 16px; margin-top: 20px; }
  .verdict-box.show { display: block; }
  .verdict-box.BUY { background: rgba(0,255,136,0.1); border: 2px solid var(--green); }
  .verdict-box.SELL { background: rgba(255,62,94,0.1); border: 2px solid var(--red); }
  .verdict-box.HOLD { background: rgba(255,214,0,0.1); border: 2px solid var(--yellow); }
  
  .v-label { font-size: 48px; font-weight: 800; font-family: 'Syne', sans-serif; letter-spacing: 2px; }
  .v-sub { font-size: 14px; margin-top: 10px; color: var(--muted); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
  .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
  .stat-val { font-size: 18px; font-weight: bold; color: white; display: block; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">TQQQ ALGO v2.1</div>
    <div id="runtime" style="color:var(--muted); font-size:12px;">Ready for Analysis</div>
  </div>

  <div class="panel">
    <div class="input-group">
      <input type="text" id="symbolInput" value="TQQQ" placeholder="Enter Ticker">
      <button id="runBtn" onclick="runAlgorithm()">RUN ANALYSIS</button>
    </div>
    <div class="step-list">
      <div class="step" id="step1">1. INITIALIZING</div>
      <div class="step" id="step2">2. FETCHING TQQQ DATA</div>
      <div class="step" id="step3">3. FETCHING VXX DATA</div>
      <div class="step" id="step4">4. SYSTEM VERDICT</div>
    </div>
  </div>

  <div id="verdictBox" class="verdict-box">
    <div class="v-label" id="vLabel">---</div>
    <div class="v-sub" id="vSub">Waiting for data collection...</div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Price</span>
        <span class="stat-val" id="statPrice">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">RSI (14)</span>
        <span class="stat-val" id="statRSI">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">VXX Proxy</span>
        <span class="stat-val" id="statVXX">--</span>
      </div>
    </div>
  </div>
</div>

<script>
// Key from your setup
const API_KEY = "fs4139MjTB8rclaerCjk0CMB59W7QCMS";

async function runAlgorithm() {
    const symbol = document.getElementById('symbolInput').value.toUpperCase();
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.textContent = "PROCESSING...";

    // Reset UI
    const steps = ['step1', 'step2', 'step3', 'step4'];
    steps.forEach(id => document.getElementById(id).className = 'step');
    document.getElementById('verdictBox').className = 'verdict-box';

    try {
        setStep('step1', 'success');

        // Step 2: TQQQ Data
        setStep('step2', 'active');
        const priceData = await fetchStockData(symbol);
        const closes = priceData.results.map(r => r.c);
        setStep('step2', 'success');

        // Step 3: VXX Proxy (Rate limit safety delay)
        setStep('step3', 'active');
        await new Promise(r => setTimeout(r, 1200)); 
        const vxxData = await fetchStockData('VXX');
        const vxxPrice = vxxData.results[vxxData.results.length - 1].c;
        const vxxPrev = vxxData.results[vxxData.results.length - 2].c;
        const volSpike = vxxPrice > (vxxPrev * 1.05);
        setStep('step3', 'success');

        // Step 4: Logic
        setStep('step4', 'active');
        const currentPrice = closes[closes.length - 1];
        const rsi = calculateRSI(closes, 14);
        const ema200 = calculateEMA(closes, 200);

        let verdict = "HOLD";
        let sub = "Market conditions are neutral.";

        if (currentPrice > ema200 && rsi < 42 && !volSpike) {
            verdict = "BUY";
            sub = "Bullish trend confirmed with oversold RSI entry.";
        } else if (rsi > 78 || currentPrice < ema200 || volSpike) {
            verdict = "SELL";
            sub = volSpike ? "Volatility Spike Warning." : "Technical breakdown detected.";
        }
        setStep('step4', 'success');

        displayResults(verdict, sub, currentPrice, rsi, vxxPrice);

    } catch (err) {
        console.error(err);
        document.getElementById('vSub').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
        document.getElementById('verdictBox').className = 'verdict-box show';
    } finally {
        btn.disabled = false;
        btn.textContent = "RUN ANALYSIS";
    }
}

async function fetchStockData(ticker) {
    const to = new Date().toISOString().split('T')[0];
    const from = new Date(Date.now() - 380 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    
    // Using the established aggregates endpoint
    const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=asc&limit=500&apiKey=${API_KEY}`;

    const response = await fetch(url);
    if (!response.ok) {
        if(response.status === 429) throw new Error("Rate limit hit. Wait 60 seconds.");
        throw new Error(`API Error ${response.status}`);
    }
    const data = await response.json();
    if (!data.results) throw new Error(`No data found for ${ticker}`);
    return data;
}

function setStep(id, status) {
    document.getElementById(id).className = `step ${status}`;
}

function calculateRSI(prices, period) {
    let gains = 0, losses = 0;
    for (let i = prices.length - period; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        diff >= 0 ? gains += diff : losses -= diff;
    }
    let rs = (gains / period) / (losses / period);
    return (100 - (100 / (1 + rs))).toFixed(2);
}

function calculateEMA(prices, period) {
    const k = 2 / (period + 1);
    let ema = prices[0];
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

function displayResults(verdict, sub, price, rsi, vxx) {
    const box = document.getElementById('verdictBox');
    box.className = `verdict-box show ${verdict}`;
    document.getElementById('vLabel').textContent = verdict;
    document.getElementById('vSub').textContent = sub;
    document.getElementById('statPrice').textContent = `$${price.toFixed(2)}`;
    document.getElementById('statRSI').textContent = rsi;
    document.getElementById('statVXX').textContent = vxx.toFixed(2);
    document.getElementById('runtime').textContent = "Last Updated: " + new Date().toLocaleTimeString();
}
</script>
</body>
</html>
